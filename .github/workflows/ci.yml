name: CI

on:
  push:
    branches: [main, 'phase-*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NEXT_PUBLIC_SITE_URL: https://trongngo.dev

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check bundle size (shared JS ≤ 180 KB gz)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const zlib = require('zlib');

          // Next.js 16 Turbopack: app-build-manifest.json does not exist.
          // Use build-manifest.json rootMainFiles — the shared chunks loaded on every page.
          const manifestPath = '.next/build-manifest.json';
          if (!fs.existsSync(manifestPath)) {
            console.error('build-manifest.json not found');
            process.exit(1);
          }
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const chunks = manifest.rootMainFiles || [];
          if (chunks.length === 0) {
            console.error('No rootMainFiles in build-manifest.json');
            process.exit(1);
          }

          let totalGz = 0;
          for (const rel of chunks) {
            const abs = path.join('.next', rel.replace(/^\\/_next\\//, ''));
            if (!fs.existsSync(abs)) continue;
            const buf = fs.readFileSync(abs);
            totalGz += zlib.gzipSync(buf).length;
          }

          const kb = Math.round(totalGz / 1024);
          const limit = 180;
          console.log('Shared initial JS (gz): ' + kb + ' KB / ' + limit + ' KB limit');
          if (kb > limit) {
            console.error('FAIL: bundle exceeds ' + limit + ' KB gz limit');
            process.exit(1);
          }
          console.log('PASS');
          "
